<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 인물 정보 관리 시스템</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        header { background: #343a40; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 15px; }
        
        /* 검색창 스타일 */
        .search-box { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }

        /* 인물 카드 스타일 */
        .person-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #007bff; }
        .info h3 { margin: 0; font-size: 18px; color: #333; }
        .info p { margin: 5px 0 0; color: #666; font-size: 14px; }
        
        /* 전화 버튼 */
        .call-btn { background: #28a745; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>👥 인물 정보 연락처</h1>
    </header>

    <input type="text" id="searchInput" class="search-box" placeholder="이름 또는 업체명 검색..." onkeyup="filterPeople()">

    <div id="peopleList"></div>
</div>

<script>
    /**
     * [사용자 데이터 수정 구역]
     * 여기에 인물 정보를 계속 추가하시면 됩니다.
     */
    const peopleData = [
        { name: "홍길동", team: "성주건설/안전팀", position: "팀장", phone: "010-1234-5678" },
        { name: "이순신", team: "대박토건/철근공", position: "반장", phone: "010-9876-5432" },
        { name: "김철수", team: "미래건축/전기팀", position: "기사", phone: "010-1111-2222" },
        { name: "박영희", team: "성주군청/감독관", position: "주무관", phone: "010-3333-4444" }
        // { name: "이름", team: "업체명", position: "직함", phone: "번호" } <- 이런 식으로 추가
    ];

    const listContainer = document.getElementById('peopleList');

    // 화면에 리스트 그리기 함수
    function displayPeople(data) {
        listContainer.innerHTML = '';
        data.forEach(person => {
            const card = `
                <div class="person-card">
                    <div class="info">
                        <h3>${person.name} <small style="color:#999; font-weight:normal;">${person.position}</small></h3>
                        <p>${person.team}</p>
                        <p style="color:#007bff;">${person.phone}</p>
                    </div>
                    <a href="tel:${person.phone}" class="call-btn">📞 전화</a>
                </div>
            `;
            listContainer.innerHTML += card;
        });
    }

    // 검색 필터 로직
    function filterPeople() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = peopleData.filter(p => 
            p.name.toLowerCase().includes(query) || 
            p.team.toLowerCase().includes(query)
        );
        displayPeople(filtered);
    }

    // 초기 실행
    displayPeople(peopleData);
</script>

</body>
</html>
